apiVersion: v1
kind: Secret
metadata:
  name: hello-copilot-github
  namespace: study-dev
type: Opaque
stringData:
  # Required GitHub permissions:
  # - Repository contents: read/write
  # - Packages: read/write
  username: YOUR_GITHUB_USERNAME
  token: YOUR_GITHUB_PAT
---
apiVersion: v1
kind: Secret
metadata:
  name: hello-copilot-registry
  namespace: study-dev
type: kubernetes.io/dockerconfigjson
stringData:
  # Use the same GitHub token, or another token with GHCR Packages read/write permission.
  .dockerconfigjson: |
    {
      "auths": {
        "ghcr.io": {
          "username": "YOUR_GITHUB_USERNAME",
          "password": "YOUR_GITHUB_PAT",
          "auth": "BASE64_OF_USERNAME_COLON_TOKEN"
        }
      }
    }
---
apiVersion: v1
kind: Secret
metadata:
  name: hello-copilot-argocd
  namespace: study-dev
type: Opaque
stringData:
  server: argocd-server.argocd.svc.cluster.local:443
  token: YOUR_ARGOCD_AUTH_TOKEN
