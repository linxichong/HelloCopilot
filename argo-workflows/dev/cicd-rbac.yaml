apiVersion: v1
kind: ServiceAccount
metadata:
  name: hello-copilot-workflow
  namespace: study-dev
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: hello-copilot-workflow
  namespace: study-dev
rules:
  - apiGroups: ["argoproj.io"]
    resources: ["workflowtaskresults"]
    verbs: ["create", "patch"]
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: hello-copilot-workflow
  namespace: study-dev
subjects:
  - kind: ServiceAccount
    name: hello-copilot-workflow
    namespace: study-dev
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: hello-copilot-workflow
