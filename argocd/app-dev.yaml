apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hello-copilot-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/linxichong/HelloCopilot.git
    targetRevision: HEAD
    path: k8s/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: study-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
