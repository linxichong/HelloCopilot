apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hello-copilot-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/linxichong/HelloCopilot.git
    targetRevision: HEAD
    path: k8s/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: study-prod
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
