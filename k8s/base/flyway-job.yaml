apiVersion: batch/v1
kind: Job
metadata:
  name: flyway-migrate
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/sync-wave: "0"
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: flyway
          image: flyway/flyway:10-alpine
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          args: ["-connectRetries=60", "migrate"]
          env:
            - name: FLYWAY_URL
              value: jdbc:postgresql://hello-copilot-postgres:5432/hello_copilot
            - name: FLYWAY_USER
              valueFrom:
                secretKeyRef:
                  name: test.hello-copilot-postgres.credentials.postgresql.acid.zalan.do
                  key: username
            - name: FLYWAY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: test.hello-copilot-postgres.credentials.postgresql.acid.zalan.do
                  key: password
          volumeMounts:
            - name: flyway-sql
              mountPath: /flyway/sql
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
      volumes:
        - name: flyway-sql
          configMap:
            name: flyway-sql-files
