apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-copilot-postgres-pgbouncer
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hello-copilot-postgres-pgbouncer
  template:
    metadata:
      labels:
        app: hello-copilot-postgres-pgbouncer
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: write-userlist
          image: busybox:1.36
          command:
            - sh
            - -c
            - printf '"%s" "%s"\n' "$DATABASE_USER" "$DATABASE_PASSWORD" > /etc/pgbouncer/secrets/userlist.txt
          env:
            - name: DATABASE_USER
              valueFrom:
                secretKeyRef:
                  name: test.hello-copilot-postgres.credentials.postgresql.acid.zalan.do
                  key: username
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: test.hello-copilot-postgres.credentials.postgresql.acid.zalan.do
                  key: password
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: pgbouncer-secrets
              mountPath: /etc/pgbouncer/secrets
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 64Mi
      containers:
        - name: pgbouncer
          image: ghcr.io/icoretech/pgbouncer-docker:1.24.1
          command:
            - pgbouncer
          args:
            - /etc/pgbouncer/pgbouncer.ini
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - name: postgres
              containerPort: 6432
          volumeMounts:
            - name: pgbouncer-config
              mountPath: /etc/pgbouncer/pgbouncer.ini
              subPath: pgbouncer.ini
              readOnly: true
            - name: pgbouncer-secrets
              mountPath: /etc/pgbouncer/secrets
              readOnly: true
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          readinessProbe:
            tcpSocket:
              port: postgres
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: postgres
            initialDelaySeconds: 10
            periodSeconds: 20
      volumes:
        - name: pgbouncer-config
          configMap:
            name: hello-copilot-postgres-pgbouncer
        - name: pgbouncer-secrets
          emptyDir:
            medium: Memory
