apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-copilot-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hello-copilot-app
  template:
    metadata:
      labels:
        app: hello-copilot-app
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: hello-copilot-app
          image: ghcr.io/linxichong/hellocopilot:latest
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 8000
          env:
            - name: PYTHONDONTWRITEBYTECODE
              value: "1"
            - name: DATABASE_URL
              value: ""
            - name: DATABASE_HOST
              value: hello-copilot-postgres-pgbouncer
            - name: DATABASE_PORT
              value: "6432"
            - name: DATABASE_NAME
              value: hello_copilot
            - name: DATABASE_USER
              valueFrom:
                secretKeyRef:
                  name: test.hello-copilot-postgres.credentials.postgresql.acid.zalan.do
                  key: username
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: test.hello-copilot-postgres.credentials.postgresql.acid.zalan.do
                  key: password
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /live
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
