apiVersion: v1
kind: ConfigMap
metadata:
  name: hello-copilot-postgres-haproxy
data:
  haproxy.cfg: |
    global
      log stdout format raw local0
      maxconn 200

    defaults
      log global
      mode tcp
      option tcplog
      timeout connect 5s
      timeout client 1m
      timeout server 1m

    frontend postgres_write
      bind *:5432
      default_backend postgres_primary

    backend postgres_primary
      option tcp-check
      default-server inter 2s fall 3 rise 2
      server primary hello-copilot-postgres:5432 check

    frontend postgres_read
      bind *:5433
      default_backend postgres_replicas

    backend postgres_replicas
      option tcp-check
      default-server inter 2s fall 3 rise 2
      server replica hello-copilot-postgres-repl:5432 check

    listen stats
      bind *:8404
      mode http
      stats enable
      stats uri /stats
      stats refresh 10s
