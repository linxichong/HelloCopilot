apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-copilot-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hello-copilot-app
  template:
    metadata:
      labels:
        app: hello-copilot-app
    spec:
      containers:
        - name: hello-copilot-app
          image: hellocopilot:local
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              value: postgresql+psycopg://test:test@hello-copilot-postgres:5432/hello_copilot
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
