apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-copilot-app
  namespace: study-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hello-copilot-app
  template:
    metadata:
      labels:
        app: hello-copilot-app
    spec:
      imagePullSecrets:
        - name: hello-copilot-registry
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: hello-copilot-app
          image: ghcr.io/linxichong/hellocopilot:c037afb29354
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 8000
          env:
            - name: PYTHONDONTWRITEBYTECODE
              value: "1"
            - name: DATABASE_URL
              value: postgresql+psycopg://test:test@hello-copilot-postgres:5432/hello_copilot
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
