apiVersion: v1
kind: ServiceAccount
metadata:
  name: hello-copilot-events-sensor
  namespace: argo-events
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: hello-copilot-events-workflow-trigger
  namespace: study-dev
rules:
  - apiGroups: ["argoproj.io"]
    resources: ["workflows"]
    verbs: ["create", "get", "list", "watch", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: hello-copilot-events-workflow-trigger
  namespace: study-dev
subjects:
  - kind: ServiceAccount
    name: hello-copilot-events-sensor
    namespace: argo-events
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: hello-copilot-events-workflow-trigger
