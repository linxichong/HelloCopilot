services:
  db:
    image: postgres:16-alpine
    container_name: hello-copilot-db
    environment:
      POSTGRES_DB: hello_copilot
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d hello_copilot"]
      interval: 5s
      timeout: 3s
      retries: 20

  flyway:
    image: flyway/flyway:10-alpine
    container_name: hello-copilot-flyway
    command: -connectRetries=60 migrate
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./db/migration:/flyway/sql:ro
    environment:
      FLYWAY_URL: jdbc:postgresql://db:5432/hello_copilot
      FLYWAY_USER: test
      FLYWAY_PASSWORD: test

volumes:
  postgres_data:
